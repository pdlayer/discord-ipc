plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'pd.discordipc'
version = '1.0.1'
description = 'дискорд интернациональное общение с процессором 2026 март'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.11.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
